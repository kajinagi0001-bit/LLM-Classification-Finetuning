services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-finetune-app
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ./data:/workspace/data
      - ./outputs:/workspace/outputs
    tty: true
    stdin_open: true
    shm_size: "16gb"
    environment:
      - PYTHONUNBUFFERED=1
      - TOKENIZERS_PARALLELISM=false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]